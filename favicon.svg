<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo bege -->
  <rect width="100" height="100" rx="20" fill="#D8C6A5"/>
  
  <!-- Tag/Etiqueta estilizada -->
  <rect x="25" y="30" width="50" height="40" rx="4" fill="#556B4F"/>
  
  <!-- Furo da etiqueta -->
  <circle cx="35" cy="40" r="3" fill="#D8C6A5"/>
  
  <!-- Letra N estilizada -->
  <path d="M38 55 L38 45 L48 55 L48 45" 
        stroke="#D8C6A5" 
        stroke-width="4" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Linha de costura decorativa -->
  <rect x="28" y="33" width="44" height="34" rx="2" 
        fill="none" 
        stroke="#D8C6A5" 
        stroke-width="1" 
        stroke-dasharray="3,3" 
        opacity="0.6"/>
</svg>
